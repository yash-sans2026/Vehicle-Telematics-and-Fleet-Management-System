<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Trip Dashboard</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            margin:30px;
        }

        h1{
            text-align:center;
        }

        .card{
            width:200px;
            margin:auto;
            background:white;
            padding:20px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 2px 5px gray;
        }

        table{
            width:100%;
            margin-top:30px;
            border-collapse:collapse;
            background:white;
        }

        th,td{

            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

        th{

            background:#1976D2;
            color:white;
        }

    </style>

</head>

<body>

<h1>Trip Dashboard</h1>


<div class="card">

    <h2>Total Trips</h2>

    <h1 id="totalTrips">0</h1>

</div>

<table>

    <thead>

    <tr>

        <th>Trip ID</th>

        <th>Vehicle</th>

        <th>Driver</th>

        <th>Start Time</th>

        <th>End Time</th>

        <th>Distance</th>

        <th>Status</th>

    </tr>

    </thead>

    <tbody id="tripTable">

    </tbody>

</table>

<script>

    async function loadTrips(){

    const response=await fetch("/api/trips/dashboard");

    const data=await response.json();

    document.getElementById("totalTrips").innerHTML=data.totalTrips;

    const tbody=document.getElementById("tripTable");

    tbody.innerHTML="";

    data.trips.forEach(trip=>{

    tbody.innerHTML+=`

    <tr>

    <td>${trip.tripId}</td>

    <td>${trip.vehicle.vehicleType}</td>

    <td>${trip.driver.username}</td>

    <td>${trip.startTime}</td>

    <td>${trip.endTime}</td>

    <td>${trip.distanceKm.toFixed(2)} km</td>

    <td>${trip.tripStatus}</td>

    </tr>

    `;

    });

    }

    loadTrips();

    setInterval(loadTrips,5000);

</script>

</body>

</html>
