<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Management - Login</title>
<html lang="en">
<head>
<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #0d6efd, #4f9cff);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        display: flex;
        width: 800px;
        background: #fff;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    /* Left branding section */
    .left {
        flex: 1;
        background: #0d6efd;
        color: #fff;
        padding: 30px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .left h1 {
        margin-bottom: 10px;
    }

    .left p {
        font-size: 14px;
        opacity: 0.9;
    }

    /* Login form */
    .right {
        flex: 1;
        padding: 40px;
    }

    .right h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    input:focus {
        border-color: #0d6efd;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        background: #0d6efd;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0b5ed7;
    }

    .extra {
        margin-top: 15px;
        font-size: 13px;
        text-align: center;
    }

    .extra a {
        color: #0d6efd;
        text-decoration: none;
    }

    .extra a:hover {
        text-decoration: underline;
    }

    .error {
        color: #d9534f;
        margin-top: 10px;
        text-align: center;
    }
</style>
</head>

<body>

<div class="container">

    <!-- Branding Section -->
    <div class="left">
        <h1>FleetOps</h1>
        <p>Smart Fleet Management System</p>
        <p>Track vehicles, manage drivers, and optimize operations efficiently.</p>
    </div>

    <!-- Login Form -->
    <div class="right">
        <h2>Sign in</h2>

        <form action="/login" method="post">
            <input type="email" name="email" placeholder="Enter your email" required />
            <input type="password" name="password" placeholder="Enter your password" required />
            <button type="submit">Login</button>
        </form>

        <div class="error">
            <p id="errorMessage"></p>
        </div>
    </div>

</div>

<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
    document.getElementById('errorMessage').textContent =
    'Invalid email or password';
    }
</script>

</body>
</html>
