<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: min(90%, 520px);
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
            padding: 28px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.8rem;
        }

        p {
            margin-bottom: 22px;
            line-height: 1.45;
            color: #475569;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            color: #1e293b;
            background: #fff;
            font-weight: 600;
        }

        .btn.primary {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Access Denied</h1>
    <p>You do not have permission to access this page. Please use an account with the required role.</p>
    <div class="actions">
        <a class="btn primary" href="/">Go to Login</a>
        <a class="btn" href="javascript:history.back()">Go Back</a>
    </div>
</div>
</body>
</html>
