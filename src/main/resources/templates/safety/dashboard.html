<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Dashboard</title>
</head>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 1200px;
        margin: auto;
    }

    h1 {
        margin-bottom: 25px;
        color: #333;
    }

    h2 {
        color: #555;
        margin-top: 30px;
        margin-bottom: 15px;
    }

    .cards {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
        flex-wrap: wrap;
    }

    .card {
        flex: 1;
        min-width: 200px;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border-left: 4px solid #007bff;
    }

    .card.warning {
        border-left-color: #ff6b6b;
    }

    .card.success {
        border-left-color: #51cf66;
    }

    .card.alert {
        border-left-color: #ffd93d;
    }

    .card h3 {
        margin: 0;
        color: #555;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .card p {
        font-size: 32px;
        font-weight: bold;
        margin-top: 10px;
        color: #333;
    }

    .table-container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        margin-bottom: 30px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    table th,
    table td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
        text-align: left;
    }

    table th {
        background: #f8f8f8;
        font-weight: bold;
        color: #333;
    }

    table tr:hover {
        background-color: #f9f9f9;
    }

    .score-high {
        color: #51cf66;
        font-weight: bold;
    }

    .score-medium {
        color: #ffd93d;
        font-weight: bold;
    }

    .score-low {
        color: #ff6b6b;
        font-weight: bold;
    }

    .status {
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 12px;
        font-weight: bold;
    }

    .status.safe {
        background-color: #d4edda;
        color: #155724;
    }

    .status.warning {
        background-color: #fff3cd;
        color: #856404;
    }

    .status.danger {
        background-color: #f8d7da;
        color: #721c24;
    }

    .loading {
        text-align: center;
        padding: 20px;
        color: #999;
    }
</style>

<body>

    <div class="container">

        <h1>Safety Dashboard</h1>

        <div class="cards">

            <div class="card success">
                <h3>Average Safety Score</h3>
                <p id="averageSafetyScore">--</p>
            </div>

            <div class="card">
                <h3>Total Safety Reports</h3>
                <p id="totalSafetyReports">0</p>
            </div>

            <div class="card alert">
                <h3>Total Overspeed Events</h3>
                <p id="totalOverspeedEvents">0</p>
            </div>

            <div class="card warning">
                <h3>Total Harsh Events</h3>
                <p id="totalHarshEvents">0</p>
            </div>

        </div>

        <div class="table-container">

            <h2>Driver Safety Scores</h2>

            <table>

                <thead>
                    <tr>
                        <th>Driver ID</th>
                        <th>Driver Name</th>
                        <th>Safety Score</th>
                        <th>Overspeed Count</th>
                        <th>Harsh Events</th>
                        <th>Collision Count</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="scoresTableBody">
                    <tr>
                        <td colspan="7" class="loading">Loading driver scores...</td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>

    <script>

        async function loadSafetyDashboard() {

            try {
                const dashboardResponse = await fetch('/api/safety/dashboard');
                const dashboardData = await dashboardResponse.json();

                document.getElementById("averageSafetyScore").innerText =
                    dashboardData.averageSafetyScore.toFixed(2);

                document.getElementById("totalSafetyReports").innerText =
                    dashboardData.totalSafetyReports;

                document.getElementById("totalOverspeedEvents").innerText =
                    dashboardData.totalOverspeedEvents;

                document.getElementById("totalHarshEvents").innerText =
                    dashboardData.totalHarshEvents;

            } catch (error) {
                console.error("Dashboard Error:", error);
                document.getElementById("averageSafetyScore").innerText = "Error";
            }
        }

        async function loadDriverScores() {

            try {
                const response = await fetch('/api/safety/scores');
                const scores = await response.json();

                const tableBody = document.getElementById("scoresTableBody");
                tableBody.innerHTML = "";

                if (scores.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="7" class="loading">No safety scores available</td></tr>';
                    return;
                }

                scores.forEach(score => {

                    const scoreClass = score.safetyScore >= 75 ? 'score-high' :
                                       score.safetyScore >= 50 ? 'score-medium' : 'score-low';

                    const statusClass = score.safetyScore >= 75 ? 'status safe' :
                                       score.safetyScore >= 50 ? 'status warning' : 'status danger';

                    const statusText = score.safetyScore >= 75 ? 'Safe' :
                                      score.safetyScore >= 50 ? 'Caution' : 'Risk';

                    let row = `
                        <tr>
                            <td>${score.driver.user_id}</td>
                            <td>${score.driver.username}</td>
                            <td class="${scoreClass}">${score.safetyScore.toFixed(2)}</td>
                            <td>${score.overspeedCount}</td>
                            <td>${score.harshEventCount}</td>
                            <td>${score.collisionCount || 0}</td>
                            <td><span class="${statusClass}">${statusText}</span></td>
                        </tr>
                    `;

                    tableBody.innerHTML += row;

                });

            } catch (error) {
                console.error("Scores Error:", error);
                document.getElementById("scoresTableBody").innerHTML =
                    '<tr><td colspan="7" class="loading">Error loading driver scores</td></tr>';
            }
        }

        loadSafetyDashboard();
        loadDriverScores();

    </script>

</body>

</html>
